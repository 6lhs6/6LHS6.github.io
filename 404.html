<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaleiBox维护中 · 敬请期待</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0b0f19;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

/* 背景浮动光点 */
.bg-particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}
.dot {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #6c63ff;
  border-radius: 50%;
  opacity: 0.6;
  animation: float 6s ease-in-out infinite;
}

/* 浮动动画 */
@keyframes float {
  0%,100% { transform: translateY(0) translateX(0); opacity: 0.4; }
  50% { transform: translateY(-30px) translateX(20px); opacity: 0.8; }
}

/* 主内容 */
.content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 20px;
  animation: fadeIn 1.2s ease-out forwards;
  opacity: 0;
}
@keyframes fadeIn {
  to { opacity: 1; }
}

/* 数字缩放+跳动 */
.code {
  font-size: 120px;
  font-weight: 900;
  color: #fff;
  position: relative;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* 渐变描边 */
.code span {
  background: linear-gradient(90deg, #6c63ff, #ff4a9f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;

  background-size: 200% 100%;
  animation: pulse 2s ease-in-out infinite,
             gradientShine 3s linear infinite;
}
@keyframes gradientShine {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 外发光旋转光环 */
.code::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: 2px solid rgba(108,99,255,0.3);
  transform: translate(-50%, -50%);
  z-index: -1;
  animation: ringRotate 8s linear infinite;
}
.code::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  border: 2px solid rgba(255,74,159,0.2);
  transform: translate(-50%, -50%);
  z-index: -1;
  animation: ringRotate 10s linear infinite reverse;
}
@keyframes ringRotate {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 文字渐入 */
.title {
  font-size: 26px;
  color: #eee;
  margin: 10px 0 10px;
  opacity: 0;
  animation: slideUp 0.8s 0.4s forwards,
             titleFlicker 4s infinite 2s;
}
.desc {
  font-size: 16px;
  color: #aaa;
  margin-bottom: 35px;
  opacity: 0;
  animation: slideUp 0.8s 0.6s forwards,
             descFloat 3s infinite ease-in-out 1s;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* 标题轻微闪烁 */
@keyframes titleFlicker {
  0%,100% { opacity: 1; }
  50% { opacity: 0.85; }
}

/* 描述文字上下轻浮 */
@keyframes descFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* 按钮：发光+悬停动效 */
.btn {
  display: inline-block;
  padding: 14px 36px;
  border-radius: 50px;
  background: linear-gradient(90deg, #6c63ff, #ff4a9f);
  color: #fff;
  text-decoration: none;
  font-weight: 500;
  box-shadow: 0 0 20px rgba(108,99,255,0.4);
  transition: all 0.3s ease;
  opacity: 0;
  animation: slideUp 0.8s 0.8s forwards,
             btnPulseGlow 2s infinite ease-in-out;
}
.btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 30px rgba(108,99,255,0.7);
}

/* 按钮呼吸发光 */
@keyframes btnPulseGlow {
  0%,100% { box-shadow: 0 0 20px rgba(108,99,255,0.4); }
  50% { box-shadow: 0 0 35px rgba(108,99,255,0.7); }
}

/* 背景弱脉动 */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, rgba(108,99,255,0.05), transparent 50%);
  z-index: 0;
  animation: bgPulse 4s infinite ease-in-out;
}
@keyframes bgPulse {
  0%,100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* 故障抖动 */
@keyframes glitch {
  0%, 100% { transform: translate(0,0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(-2px,-2px); }
  60% { transform: translate(2px,2px); }
  80% { transform: translate(2px,-2px); }
}

/* 霓虹横向扫描 */
@keyframes scan {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* 文字故障 + 扫描 */
.code span::after {
  content: '维护中';
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, #6c63ff, transparent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: scan 4s linear infinite, glitch 0.3s infinite paused;
}
.code:hover span::after {
  animation-play-state: running;
}

/* 全屏扫描线 */
.scan-line {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(transparent, rgba(108,99,255,0.08), transparent);
  z-index: 3;
  pointer-events: none;
  animation: scanLine 6s linear infinite;
}
@keyframes scanLine {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

/* 粒子连线画布 */
#particleCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}
</style>
</head>

<body>
<canvas id="particleCanvas"></canvas>
<div class="bg-particles" id="particles"></div>
<div class="scan-line"></div>

<div class="content">
  <div class="code"><span>维护中</span></div>
  <div class="title">KaleiBox正在维护</div>
  <div class="desc">KaleiBox正在优化，敬请稍后访问</div>
  <a href="/" class="btn">敬请期待</a>
</div>

<script>
// 原有光点
const particles = document.getElementById('particles');
for(let i=0;i<80;i++){
  let dot = document.createElement('div');
  dot.classList.add('dot');
  dot.style.left = Math.random()*100 + '%';
  dot.style.top = Math.random()*100 + '%';
  dot.style.animationDelay = Math.random()*6 + 's';
  particles.appendChild(dot);
}

// 粒子连线动效
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

let points = [];
for(let i=0;i<50;i++){
  points.push({
    x: Math.random()*w,
    y: Math.random()*h,
    vx: (Math.random()-0.5)*0.5,
    vy: (Math.random()-0.5)*0.5
  })
}

function draw(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#6c63ff';
  points.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;
    if(p.x<0||p.x>w) p.vx*=-1;
    if(p.y<0||p.y>h) p.vy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fill();
  })

  ctx.strokeStyle = 'rgba(108,99,255,0.2)';
  ctx.lineWidth = 0.5;
  for(let i=0;i<points.length;i++){
    for(let j=i+1;j<points.length;j++){
      let dx = points[i].x - points[j].x;
      let dy = points[i].y - points[j].y;
      let dist = Math.hypot(dx,dy);
      if(dist < 120){
        ctx.beginPath();
        ctx.moveTo(points[i].x,points[i].y);
        ctx.lineTo(points[j].x,points[j].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();

window.onresize = ()=>{
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
</script>
</body>
</html>
