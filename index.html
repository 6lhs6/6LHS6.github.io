<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial,sans-serif;user-select:none;}
:root{--primary:#333;--primary-light:#e5e5e5;--gray-light:#d1d5db;--white:#F0F0F0;--shadow:0 2px 8px rgba(51,51,51,0.1);--radius:6px;--transition:all 0.3s ease;}

body{background:#FFEFF4;color:#333;padding:0 0 2rem;overflow-x:hidden;}
.container{width:94%;max-width:1200px;margin:0 auto;position:relative;z-index:1;}
.page{display:none;}
.page.active{display:block;}

#petalCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:1;}
#particleCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:999999;}

#siteLoader{position:fixed;top:0;left:0;width:100%;height:100%;background:#FFEFF4;display:flex;align-items:center;justify-content:center;z-index:9999999;flex-direction:column;gap:20px;}
.loader-img{width:100px;height:100px;object-fit:contain;}
.loader-circle{width:50px;height:50px;border:4px solid rgba(220, 160, 180, 0.3);border-top:4px solid #DAA8B6;border-radius:50%;animation:loaderRotate 1s linear infinite;}
.loader-text{font-size:15px;color:#a97d8d;}
@keyframes loaderRotate{to{transform:rotate(360deg);}}
@keyframes loaderFade{to{opacity:0;visibility:hidden;}}

.glass-container{background:rgba(240,240,240,0.85);backdrop-filter:blur(8px);border:1px solid rgba(240,240,240,0.6);box-shadow:var(--shadow);}
.ripple-btn{position:relative;overflow:hidden;cursor:pointer;transition:all 0.3s ease;}
.ripple{position:absolute;border-radius:50%;background:rgba(51,51,51,0.25);transform:scale(0);animation:ripple 0.8s ease-out;pointer-events:none;}
@keyframes ripple{to{transform:scale(4);opacity:0;}}
@keyframes btnBounce{0%{transform:scale(1);}50%{transform:scale(0.92);}100%{transform:scale(1);}}
.btn-bounce:active{animation:btnBounce 0.4s ease;}
@keyframes glow{0%{box-shadow:0 4px 12px rgba(51,51,51,0.1);}50%{box-shadow:0 4px 20px rgba(51,51,51,0.18),0 0 12px rgba(51,51,51,0.15);}100%{box-shadow:0 4px 12px rgba(51,51,51,0.1);}}
@keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
.loader-wrapper{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:99999;flex-direction:column;gap:12px;color:#fff;font-size:14px;}
.loader{width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top:3px solid #fff;border-radius:50%;animation:spin 1.2s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.4s ease forwards;}

.fav-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9999;}
.fav-modal.active{display:flex;}
.fav-box{background:var(--white);width:90%;max-width:380px;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
.fav-header{padding:12px 15px;background:var(--primary);color:#fff;display:flex;justify-content:space-between;align-items:center;}
.fav-close{cursor:pointer;font-size:16px;}
.fav-body{padding:15px;max-height:400px;overflow-y:auto;}
.fav-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e0e0e0;}
.fav-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;cursor:pointer;font-weight: bold;}
.fav-actions{display:flex;gap:6px;}
.fav-btn{padding:4px 8px;font-size:12px;border-radius:4px;border:none;background:var(--primary-light);cursor:pointer;}
.fav-btn.primary{background:var(--primary);color:#fff;}
.no-fav{text-align:center;padding:20px 0;color:#999;font-size:14px;}

.header{padding:0.3rem 0;margin-bottom:0.8rem;position:sticky;top:0;z-index:100;}
.header-content{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:0.5rem;}
.logo{display:flex;align-items:center;gap:0.4rem;text-decoration:none;color:var(--primary);}
.logo-img{width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);}
.nav-menu{display:flex;gap:0.5rem;flex-wrap:wrap;}
.nav-item{padding:0.25rem 0.6rem;border-radius:var(--radius);color:#333;text-decoration:none;font-size:0.8rem;transition:var(--transition);}
.nav-item:hover,.nav-item.active{background:var(--primary-light);color:var(--primary);transform:translateY(-1px);}
.nav-toggle{display:none;background:none;border:none;font-size:1rem;color:var(--primary);cursor:pointer;}

/* 四个广告小方块 */
.ad-four-grid{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  max-width: 350px;
  width: 100%;
}
.ad-four-item{
  aspect-ratio: 3 / 1;
  border-radius: var(--radius);
  overflow: hidden;
  background: #fff;
  box-shadow: var(--shadow);
}
.ad-four-item img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.scroll-notice{width:100%;height:24px;line-height:24px;background:var(--primary-light);border-radius:var(--radius);overflow:hidden;margin:0.3rem 0;padding:0 0.6rem;border:1px solid rgba(51,51,51,0.2);}
.scroll-notice-content{display:flex;animation:scroll 15s linear infinite;white-space:nowrap;}
.scroll-notice-text{color:var(--primary);font-size:0.75rem;}
.header-right{display:flex;align-items:center;gap:0.8rem;}
.btn{padding:0.25rem 0.6rem;border-radius:var(--radius);border:none;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:0.3rem;transition:var(--transition);}
.btn-notice{background:#666;color:var(--white);}
.btn-notice:hover{background:var(--primary);transform:translateY(-1px);}
.btn-back{background:var(--primary-light);color:var(--primary);}
.btn-back:hover{background:var(--primary);color:var(--white);transform:translateY(-1px);}
.badge{background:var(--white);color:#666;font-size:0.6rem;padding:0.05rem 0.25rem;border-radius:8px;position:relative;top:-2px;}
.real-time-clock{font-size:0.8rem;display:flex;align-items:center;gap:0.3rem;white-space:nowrap;}
.clock-icon{color:var(--primary);}
.ad-carousel{width:100%;height:180px;margin-bottom:0.8rem;border-radius:var(--radius);overflow:hidden;position:relative;box-shadow:var(--shadow);cursor:pointer;}
.carousel-wrapper{width:100%;height:100%;display:flex;transition:transform 0.5s ease-out;}
.ad-item{flex:0 0 100%;}
.ad-item img{width:100%;height:100%;object-fit:cover;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(240,240,240,0.8);border:none;color:var(--primary);font-size:0.9rem;cursor:pointer;z-index:10;transition:all 0.3s;}
.carousel-btn:hover{background:var(--white);transform:translateY(-50%) scale(1.1);}
.btn-prev{left:8px;}
.btn-next{right:8px;}
.carousel-indicators{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:10;}
.indicator{width:7px;height:7px;border-radius:50%;background:rgba(240,240,240,0.6);cursor:pointer;transition:all 0.3s;}
.indicator.active{background:var(--primary);width:18px;border-radius:4px;}
.tag-filter{display:flex;align-items:center;flex-wrap:wrap;gap:0.2rem;padding:0.2rem 0.4rem;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:0.6rem;border:1px solid var(--gray-light);min-height:36px;align-content:center;}
.filter-title{font-size:0.7rem;margin-right:0.1rem;white-space:nowrap;}
.filter-tags{display:flex;flex-wrap:wrap;gap:0.2rem;flex:1;}
.filter-tag{padding:0.12rem 0.4rem;border-radius:12px;font-size:0.65rem;background:var(--primary-light);color:var(--primary);cursor:pointer;border:none;height:22px;display:flex;align-items:center;justify-content:center;gap:0.2rem;transition:all 0.3s ease;}
.filter-tag:hover{transform:translateY(-1px) scale(1.05);}
.filter-tag.active{background:var(--primary);color:var(--white);}
.url-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:0.6rem;margin-bottom:1.5rem;}
.url-card{background:var(--white);border-radius:var(--radius);padding:0.6rem 0.4rem;box-shadow:var(--shadow);border:1px solid var(--gray-light);cursor:pointer;min-height:100px;display:flex;flex-direction:column;justify-content:space-between;transition:all 0.3s ease;position:relative;overflow:hidden;}
.url-card:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 6px 18px rgba(51,51,51,0.15);animation:glow 2s ease-in-out infinite alternate;}
.card-title{font-size:0.75rem;font-weight: bold;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:center;}
.card-tags{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin:0.4rem 0;}
.tag{font-size:0.6rem;padding:0.1rem 0.3rem;background:var(--primary-light);color:var(--primary);border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.url-card:hover .tag{background:var(--primary);color:var(--white);}
.card-bottom{display:flex;gap:4px;width:100%;}
.visit-btn{flex:1;display:flex;align-items:center;justify-content:center;background:var(--primary-light);color:var(--primary);text-decoration:none;border-radius:var(--radius);font-size:0.7rem;height:28px;transition:all 0.3s ease;}
.url-card:hover .visit-btn{background:var(--primary);color:var(--white);}

.url-card:hover .add-fav{background:var(--primary);color:var(--white);}
.add-fav.faved{background:var(--primary);color:var(--white);}

.notice-header{font-size:1.3rem;color:var(--primary);margin-bottom:1rem;padding-bottom:0.4rem;border-bottom:2px solid var(--primary-light);}

.notice-item:hover{padding-left:0.5rem;border-left:3px solid var(--primary);background:#eaeaea;}
.notice-date{font-size:0.8rem;color:#666;font-weight:60;margin-bottom:0.4rem;}

#viewer{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--white);z-index:9999;}
#viewer.active{display:block;animation:fadeIn 0.4s ease;}

#close-view:hover{background:rgba(0,0,0,0.7);transform:scale(1.1);}

.offline-container {width:100%;height:100vh;background:linear-gradient(135deg, #141e30, #243b55);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;position:relative;overflow:hidden;}

.wave2 {bottom:20px;animation:wave 18s linear infinite reverse;opacity:0.1;}
@keyframes wave {0%{transform:translateX(0);}100%{transform:translateX(-1440px);}}
.offline-icon {font-size:80px;margin-bottom:20px;color:#4fc3f7;animation:float 3s ease-in-out infinite;}
@keyframes float {0%,100%{transform:translateY(0px);}50%{transform:translateY(-15px);}}
.offline-title {font-size:24px;font-weight:bold;margin-bottom:10px;}
.offline-desc {font-size:14px;color:#aaa;text-align:center;line-height:1.6;margin-bottom:35px;max-width:280px;}
.offline-btn {padding:12px 30px;background:#4fc3f7;color:#111;border:none;border-radius:50px;font-size:15px;font-weight:bold;cursor:pointer;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(79,195,247,0.3);}

@media (max-width:768px){

}
</style>
</head>

<script>
// ===================== 淡金粉色花瓣飘落动画 =====================
(function(){
  const canvas = document.getElementById('petalCanvas');
  const ctx = canvas.getContext('2d');
  let w = window.innerWidth;
  let h = window.innerHeight;
  canvas.width = w;
  canvas.height = h;

  const petals = [];
  const petalCount = 54;

  class Petal {
    constructor() {
      this.x = Math.random() * w;
      this.y = Math.random() * -h;
      this.size = Math.random() * 14 + 6;
      this.speedY = Math.random() * 1.5 + 0.5;
      this.speedX = Math.random() * 1 - 0.5;
      this.angle = Math.random() * Math.PI * 2;
      this.spin = Math.random() * 0.02 - 0.01;
      this.opacity = Math.random() * 0.4 + 0.2;
    }
    update() {
      this.y += this.speedY;
      this.x += this.speedX;
      this.angle += this.spin;
      if (this.y > h) {
        this.y = -20;
        this.x = Math.random() * w;
      }
      if (this.x < 0 || this.x > w) {
        this.x = Math.random() * w;
      }
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = '#F7C9D9';
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function init() {
    for (let i = 0; i < petalCount; i++) {
      petals.push(new Petal());
    }
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);
    petals.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animate);
  }

  init();
  animate();

  window.addEventListener('resize', () => {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
  });
})();

// ===================== 动态金粉粒子效果 =====================
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w = window.innerWidth, h = window.innerHeight;
canvas.width = w; canvas.height = h;

let particles = [];
let mouse = {x: -1000, y: -1000};

class Particle{
  constructor(){
    this.x = mouse.x;
    this.y = mouse.y;
    this.vx = (Math.random()-0.5)*2;
    this.vy = (Math.random()-0.5)*2;
    this.alpha = 1;
    this.size = Math.random()*2 + 1;
    this.color = `rgba(218, 168, 182, ${this.alpha})`;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    this.alpha -= 0.015;
    this.color = `rgba(218, 168, 182, ${this.alpha})`;
  }
  draw(){
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

function createParticles(){
  for(let i=0;i<8;i++) particles.push(new Particle());
}

function animate(){
  ctx.clearRect(0,0,w,h);
  particles = particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('mousemove',(e)=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  createParticles();
});

window.addEventListener('touchmove',(e)=>{
  if(e.touches.length>0){
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    createParticles();
  }
});

window.addEventListener('resize',()=>{
  w=window.innerWidth;h=window.innerHeight;
  canvas.width=w;canvas.height=h;
});

function addToFav(item, btnEl) {
  const favs = getFavs();

  if (exists) {
    favs = favs.filter(f => f.url !== item.url);
    btnEl.classList.remove("faved");
  } else {

  renderFavList();
}

let currentAdIndex=0,adInterval=null;const AD_AUTO_PLAY_INTERVAL=4000;
const READ_NOTICE_KEY="read_notice_ids";
let selectedTags=[],allTags=[],isOpening=false;
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);

function showLoader(){ $("#loader").style.display="flex"; }
function hideLoader(){ $("#loader").style.display="none"; }

const offlineHtml = `
<div class="offline-container">
  <div class="wave"></div><div class="wave wave2"></div>
  <div class="offline-icon"><i class="fas fa-wifi"></i></div>
  <div class="offline-title">网络连接异常</div>
  <div class="offline-desc">当前处于离线状态，无法打开<br>请检查网络是否连接成功</div>
  <button class="offline-btn" onclick="window.parent.closeViewer()">返回首页</button>
</div>
`;

function openUrl(item){
  if(isOpening)return;isOpening=true;showLoader();const frame=$("#frame");
  if(!navigator.onLine){
    setTimeout(()=>{frame.srcdoc=offlineHtml;$("#viewer").classList.add("active");hideLoader();isOpening=false;},300);return;
  }
  frame.onload=()=>{hideLoader();$("#viewer").classList.add("active");isOpening=false;};
  $("#top-mask").style.height=item.top+"px";$("#bottom-mask").style.height=item.bottom+"px";frame.src=item.url;
}
function closeViewer(){$("#viewer").classList.remove("active");const frame=$("#frame");frame.onload=null;frame.src="about:blank";hideLoader();isOpening=false;}

function updateClock(){
  const now=new Date();const pad=n=>String(n).padStart(2,"0");
  $("#clockText").textContent=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
setInterval(updateClock,1000);updateClock();

function switchPage(pageId){
  $$(".page").forEach(p=>p.classList.remove("active"));$(pageId).classList.add("active");
  if(pageId==="#noticePage")markAllAsRead();
  $$(".nav-menu").forEach(m=>m.classList.remove("active"));

}
function initNavToggle(toggleId,menuId){
  $(toggleId).addEventListener("click",()=>{
    const menu=$(menuId);menu.classList.toggle("active");
    const icon=$(toggleId).querySelector("i");
    icon.className=menu.classList.contains("active")?"fas fa-times":"fas fa-bars";
  });
}

function filterAndRender(){
  let list=[...urlData];
  if(selectedTags.length>0)list=list.filter(item=>selectedTags.some(tag=>item.tags.includes(tag)));

function initRipple(){
  $$(".ripple-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{
      const r=document.createElement("span");const rect=btn.getBoundingClientRect();
      const size=Math.min(rect.width,rect.height);
      r.style.width=r.style.height=size+"px";
      r.style.left=e.clientX-rect.left-size/2+"px";
      r.style.top=e.clientY-rect.top-size/2+"px";
      r.classList.add("ripple");btn.appendChild(r);setTimeout(()=>r.remove(),800);
    });
  });
}
function initCarousel(){
  const items=$$("#carouselWrapper .ad-item"),indicators=$("#carouselIndicators");
  indicators.innerHTML="";items.forEach((_,i)=>{
    const d=document.createElement("div");d.className="indicator"+(i===0?" active":"");
    d.addEventListener("click",()=>goToAd(i));indicators.appendChild(d);
  });
  goToAd(0);
  $("#prevBtn").onclick=()=>goToAd(currentAdIndex-1);
  $("#nextBtn").onclick=()=>goToAd(currentAdIndex+1);
  adInterval=setInterval(()=>goToAd(currentAdIndex+1),AD_AUTO_PLAY_INTERVAL);
}
function goToAd(i){
  const items=$$("#carouselWrapper .ad-item");
  currentAdIndex=(i+items.length)%items.length;
  $("#carouselWrapper").style.transform=`translateX(-${currentAdIndex*100}%)`;
  $$(".indicator").forEach((d,j)=>d.classList.toggle("active",j===currentAdIndex));
}
function getAllTags(){const s=new Set();urlData.forEach(i=>i.tags.forEach(t=>s.add(t)));allTags=Array.from(s).sort();}

    b.textContent=t;
    b.addEventListener("click",()=>{
      if(selectedTags.includes(t))selectedTags=selectedTags.filter(x=>x!==t);else selectedTags.push(t);

}
function renderUrlCards(list){

  const favs = getFavs();

function checkUnread(){

    $("#unreadBadge").style.display="none";

}

document.addEventListener("DOMContentLoaded",()=>{
